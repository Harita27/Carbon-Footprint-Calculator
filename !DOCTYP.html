<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carbon Footprint Calculator</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #e8f5e9; 
      margin: 0; 
      padding: 0; 
    }
    .card {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      text-align: center;
    }
    h1, h2 { color: #2e7d32; }
    label { display: block; margin: 12px 0; text-align: left; }
    input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; }
    button {
      padding: 12px 20px;
      border: none;
      background: #2e7d32;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
      font-size: 16px;
    }
    button:hover { background: #1b5e20; }
    .hidden { display: none; }
    img.icon { width: 60px; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Home Page -->
    <section id="home">
      <img src="https://cdn-icons-png.flaticon.com/512/3314/3314425.png" class="icon" alt="Earth">
      <h1>Welcome to the Carbon Footprint Calculator</h1>
      <p>Measure your environmental impact and discover ways to reduce it 🌱</p>
      <button onclick="showPage('house')">Start</button>
    </section>

    <!-- House Page -->
    <section id="house" class="hidden">
      <img src="https://cdn-icons-png.flaticon.com/512/619/619034.png" class="icon" alt="House">
      <h2>Household Energy</h2>
      <label>Electricity (kWh/month): <input type="number" id="electricity"></label>
      <label>Gas (units/month): <input type="number" id="gas"></label>
      <button onclick="showPage('home')">Back</button>
      <button onclick="showPage('travel')">Next</button>
    </section>

    <!-- Travel Page -->
    <section id="travel" class="hidden">
      <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png" class="icon" alt="Travel">
      <h2>Travel</h2>
      <label>Bike Distance (km/week): <input type="number" id="bike"></label>
      <label>Car Distance (km/week): <input type="number" id="car"></label>
      <label>Bus Distance (km/week): <input type="number" id="bus"></label>
      <label>Train Distance (km/week): <input type="number" id="train"></label>
      <button onclick="showPage('house')">Back</button>
      <button onclick="showPage('flights')">Next</button>
    </section>

    <!-- Flights Page -->
    <section id="flights" class="hidden">
      <img src="https://cdn-icons-png.flaticon.com/512/681/681392.png" class="icon" alt="Airplane">
      <h2>Flights</h2>
      <label>Short Flights (per year): <input type="number" id="short"></label>
      <label>Long Flights (per year): <input type="number" id="long"></label>
      <button onclick="showPage('travel')">Back</button>
      <button onclick="calculate()">See Results</button>
    </section>

    <!-- Results Page -->
    <section id="results" class="hidden">
      <img src="https://cdn-icons-png.flaticon.com/512/2909/2909759.png" class="icon" alt="Results">
      <h2>Your Results</h2>
      <div id="output"></div>
      <button onclick="showPage('flights')">Back</button>
      <button onclick="resetCalc()">Start Again</button>
    </section>
  </div>

  <script>
    function showPage(pageId) {
      document.querySelectorAll("section").forEach(sec => sec.classList.add("hidden"));
      document.getElementById(pageId).classList.remove("hidden");
    }

    function calculate() {
      const elec = Number(document.getElementById("electricity").value) || 0;
      const gas = Number(document.getElementById("gas").value) || 0;
      const bike = Number(document.getElementById("bike").value) || 0;
      const car = Number(document.getElementById("car").value) || 0;
      const bus = Number(document.getElementById("bus").value) || 0;
      const train = Number(document.getElementById("train").value) || 0;
      const shortF = Number(document.getElementById("short").value) || 0;
      const longF = Number(document.getElementById("long").value) || 0;

      // Example emission factors
      const elec_em = elec * 0.82;
      const gas_em = gas * 2.0;
      const bike_em = bike * 0.01;     
      const car_em = car * 0.12;
      const bus_em = bus * 0.05;
      const train_em = train * 0.03;
      const short_em = shortF * 250;
      const long_em = longF * 1100;

      const total = elec_em + gas_em + bike_em + car_em + bus_em + train_em + short_em + long_em;

      document.getElementById("output").innerHTML = `
        <p>Electricity: ${elec_em.toFixed(2)} kg CO₂</p>
        <p>Gas: ${gas_em.toFixed(2)} kg CO₂</p>
        <p>Bike: ${bike_em.toFixed(2)} kg CO₂</p>
        <p>Car: ${car_em.toFixed(2)} kg CO₂</p>
        <p>Bus: ${bus_em.toFixed(2)} kg CO₂</p>
        <p>Train: ${train_em.toFixed(2)} kg CO₂</p>
        <p>Flights (Short): ${short_em.toFixed(2)} kg CO₂</p>
        <p>Flights (Long): ${long_em.toFixed(2)} kg CO₂</p>
        <h3>Total: ${total.toFixed(2)} kg CO₂</h3>
      `;

      showPage("results");
    }

    function resetCalc() {
      document.querySelectorAll("input").forEach(i => i.value = "");
      showPage("home");
    }
  </script>
</body>
</html>
